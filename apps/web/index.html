<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledgermain — Pathfinder 1e Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      Cloudflare Web Analytics (cookieless, no PII). Injected only on the real
      production host so local dev, workers.dev previews, and forks never send
      beacons to this site's token. `spa: true` makes client-side route changes
      count as page views — required, since Ledgermain is a single-page app.
    -->
    <script>
      if (location.hostname === "ledgermain.whizkid.dev") {
        const s = document.createElement("script");
        s.defer = true;
        s.src = "https://static.cloudflareinsights.com/beacon.min.js";
        s.setAttribute(
          "data-cf-beacon",
          JSON.stringify({ token: "2857eb7a121e40da93ef2740bef58720", spa: true }),
        );
        document.head.appendChild(s);
      }
    </script>
  </body>
</html>
